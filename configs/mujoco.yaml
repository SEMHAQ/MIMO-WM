# MuJoCo Humanoid experiment config

data:
  data_dir: "data/humanoid"
  seq_len: 32
  batch_size: 32
  num_workers: 0
  normalize: true
  state_dim: 376
  action_dim: 17

ssm_wm:
  d_model: 256
  d_state: 32
  n_layers: 4
  d_conv: 4
  expand: 2

lstm_wm:
  hidden_dim: 256
  n_layers: 2

transformer_wm:
  d_model: 256
  nhead: 8
  n_layers: 3

train:
  epochs: 30
  lr: 5.0e-4
  weight_decay: 1.0e-4
  lr_scheduler: cosine
  warmup_epochs: 5
  multi_step_loss_weight: 0.5
  multi_step_horizon: 4
  grad_clip: 1.0
  seed: 42

mpc:
  horizon: 10
  Q_weight: 1.0
  R_weight: 0.01
  n_iterations: 50
  lr: 0.01

log:
  save_dir: "experiments/mujoco/"
  log_interval: 5
  eval_interval: 5
  save_best: true
